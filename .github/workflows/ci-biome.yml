name: "CI - Biome"
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  format-and-lint:
    name: "Biome (format + lint)"
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: "Ejecutar Biome en Aplicaciones Frontend"
        run: npx @biomejs/biome ci ./apps/web ./apps/backoffice

  typecheck:
    name: "TypeScript (web + backoffice)"
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Instalar dependencias (web)
        working-directory: ./apps/web
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (web)
        working-directory: ./apps/web
        run: pnpm typecheck

      - name: Instalar dependencias (backoffice)
        working-directory: ./apps/backoffice
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (backoffice)
        working-directory: ./apps/backoffice
        run: pnpm typecheck

  backend-go:
    name: "Validar Código Backend (Go)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/api
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache-dependency-path: apps/api/go.sum

      - name: Descargar Dependencias
        run: go mod download

      - name: Ejecutar Pruebas
        run: go test ./...

      - name: Verificar Compilación
        run: go build -v ./...
