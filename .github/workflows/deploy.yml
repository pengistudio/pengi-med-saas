name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  ORG: pengistudio

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          file: apps/api/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ env.ORG }}/pengi-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ env.ORG }}/pengi-web:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build & push Backoffice
        uses: docker/build-push-action@v5
        with:
          context: apps/backoffice
          file: apps/backoffice/Dockerfile
          push: true
          tags: ghcr.io/${{ env.ORG }}/pengi-backoffice:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha,scope=backoffice
          cache-to: type=gha,mode=max,scope=backoffice

      - name: Build & push Landing
        uses: docker/build-push-action@v5
        with:
          context: apps/landing
          file: apps/landing/Dockerfile
          push: true
          tags: ghcr.io/${{ env.ORG }}/pengi-landing:latest
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

      - name: Build & push SRI XML Signer
        uses: docker/build-push-action@v5
        with:
          context: apps/sri-xml-signer
          file: apps/sri-xml-signer/Dockerfile
          push: true
          tags: ghcr.io/${{ env.ORG }}/pengi-sri-xml-signer:latest
          cache-from: type=gha,scope=sri-xml-signer
          cache-to: type=gha,mode=max,scope=sri-xml-signer

  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH & deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            # Login al registry para poder hacer pull de imágenes privadas
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd ~/pengi-med-saas/deploy

            # Bajar los cambios del repo (Caddyfile, compose, etc.)
            git -C ~/pengi-med-saas pull

            # Traer nuevas imágenes y reiniciar servicios
            docker compose --env-file .env.prod -f docker-compose.prod.yaml pull
            docker compose --env-file .env.prod -f docker-compose.prod.yaml up -d

            # Limpiar imágenes viejas
            docker image prune -f
