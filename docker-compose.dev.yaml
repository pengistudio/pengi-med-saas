services:
  api:
    build:
      context: apps/api
      dockerfile: Dockerfile.dev
    container_name: pengi-api
    ports:
      - "8000:8080"
    environment:
      - GIN_MODE=debug
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./apps/api/.env
    volumes:
      - ./apps/api:/app
      - ./storage:/app/storage
    networks:
      - gentoo_network

  db:
    image: postgres:15-alpine
    container_name: pengi-db-dev
    restart: on-failure
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pengi_gentoo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gentoo_network

  icd-api:
    image: whoicd/icd-api
    container_name: icd-api
    restart: on-failure
    environment:
      - acceptLicense=true
      - saveAnalytics=false
      - include=2026-01_en-es
    ports:
      - "8091:80"
    networks:
      - gentoo_network

  gotenberg:
    container_name: gotenberg-gentoo
    image: gotenberg/gotenberg:8
    restart: on-failure
    ports:
      - "8001:3000"
    networks:
      - gentoo_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: pengi-rabbitmq-dev
    restart: on-failure
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gentoo_network

  sri-xml-signer:
    image: node:20-alpine
    container_name: sri-xml-signer
    working_dir: /app
    ports:
      - "9000:9000"
    environment:
      - PNPM_HOME=/pnpm/store
      - ALLOWED_ORIGIN=http://pengi-api:8080
    volumes:
      - ./apps/sri-xml-signer:/app
      - pnpm_store:/pnpm/store
    command: sh -c "corepack enable && pnpm install && pnpm run dev"
    networks:
      - gentoo_network

  web:
    image: node:20-alpine
    container_name: pengi-web-dev
    working_dir: /app
    ports:
      - "3000:5173"
    environment:
      - CI=true
      - PNPM_HOME=/pnpm/store
    volumes:
      - ./apps/web:/app
      - pnpm_store:/pnpm/store
    command: sh -c "corepack enable && pnpm install && pnpm run dev --host"
    networks:
      - gentoo_network

  backoffice:
    image: node:20-alpine
    container_name: pengi-backoffice-dev
    working_dir: /app
    ports:
      - "3001:5173"
    environment:
      - CI=true
      - PNPM_HOME=/pnpm/store
    volumes:
      - ./apps/backoffice:/app
      - pnpm_store:/pnpm/store
    command: sh -c "corepack enable && pnpm install && pnpm run dev --host"
    networks:
      - gentoo_network

  landing:
    image: node:20-alpine
    container_name: pengi-landing-dev
    working_dir: /app
    ports:
      - "3002:4321"
    environment:
      - CI=true
      - PNPM_HOME=/pnpm/store
    volumes:
      - ./apps/landing:/app
      - pnpm_store:/pnpm/store
    command: sh -c "corepack enable && pnpm install && pnpm run dev --host"
    networks:
      - gentoo_network

volumes:
  postgres_data:
  pnpm_store:

networks:
  gentoo_network:
    driver: bridge